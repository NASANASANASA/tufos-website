[build]
  publish = "."
[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "no-cache"
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
